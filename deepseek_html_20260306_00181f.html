<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Покер против бота</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Шапка с информацией -->
        <div class="header">
            <div class="player-info">
                <span id="player-name">Игрок</span>
                <span class="chips" id="player-chips">1000</span>
            </div>
            <div class="pot">Банк: <span id="pot-amount">0</span></div>
            <div class="bot-info">
                <span>Бот</span>
                <span class="chips" id="bot-chips">1000</span>
            </div>
        </div>

        <!-- Стол с картами -->
        <div class="table">
            <!-- Карты бота (скрыты) -->
            <div class="bot-cards">
                <div class="card back" id="bot-card1"></div>
                <div class="card back" id="bot-card2"></div>
            </div>

            <!-- Общие карты -->
            <div class="community-cards">
                <div class="card" id="community1"></div>
                <div class="card" id="community2"></div>
                <div class="card" id="community3"></div>
                <div class="card" id="community4"></div>
                <div class="card" id="community5"></div>
            </div>

            <!-- Карты игрока -->
            <div class="player-cards">
                <div class="card" id="player-card1"></div>
                <div class="card" id="player-card2"></div>
            </div>
        </div>

        <!-- Статус игры -->
        <div class="game-status" id="game-status">
            Нажмите "Сдать карты" для начала игры
        </div>

        <!-- Кнопки управления -->
        <div class="controls">
            <button class="btn" id="deal-btn">Сдать карты</button>
            <button class="btn" id="check-btn" disabled>Чек</button>
            <button class="btn" id="call-btn" disabled>Колл</button>
            <button class="btn" id="raise-btn" disabled>Рейз</button>
            <button class="btn" id="fold-btn" disabled>Пас</button>
            <button class="btn" id="next-round-btn" disabled>Следующий раунд</button>
        </div>

        <!-- Сообщение для Telegram -->
        <div class="telegram-note" id="telegram-note"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
